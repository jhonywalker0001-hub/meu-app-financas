name: Build APK Final 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Baixar seu Código
        uses: actions/checkout@v4

      - name: 2. Preparar Java (Obrigatório)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Instalar Dependências de Sistema
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt install -y libsqlite3-dev sqlite3 bzip2 libbz2-dev libc6-dev libgdbm-dev libncursesw5-dev libreadline-gplv2-dev libssl-dev tk-dev wget curl lzma liblzma-dev
          pip3 install --user --upgrade buildozer Cython==0.29.33

      - name: 4. Gerar APK (A fase demorada)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # O yes aceita as licenças do Google automaticamente
          yes | buildozer android debug

      - name: 5. Disponibilizar APK para Download
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-lotofacil-final
          path: bin/*.apk
