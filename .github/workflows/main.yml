name: Build APK
on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # Usando a versão com @master para garantir o acesso
        uses: kivy/buildozer-action@master
        with:
          command: buildozer android debug
          repository_root: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
