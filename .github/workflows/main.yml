name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential openjdk-17-jdk-headless zip unzip libffi-dev libssl-dev autoconf libtool pkg-config
          pip install Cython==0.29.33 buildozer

      - name: Criar APK
        run: |
          unset ANDROID_NDK_HOME
          unset ANDROID_HOME
          buildozer -v android debug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-financas-final
          path: bin/*.apk
