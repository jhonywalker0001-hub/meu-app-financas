name: Build APK Final S25
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
           ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3-dev libsdl2-dev python3-setuptools libffi-dev libssl-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer
          export PATH=$PATH:$HOME/.local/bin

      - name: Compilar APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # O yes | garante que nenhuma pergunta trave o build em 15 segundos
          yes | buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-estatisticas-S25
          path: bin/*.apk
