name: Build APK Financas 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python e Java
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpeza e Instalacao
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zip unzip libffi-dev libssl-dev autoconf libtool pkg-config
          pip install Cython==0.29.33 buildozer
          # Deleta qualquer vestigio de NDK pre-instalado no sistema
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle

      - name: Gerar APK
        run: |
          # FORCA O ISOLAMENTO: Limpa as variaveis que estao causando o erro 1
          export ANDROID_NDK_HOME=""
          export ANDROID_NDK_ROOT=""
          export ANDROID_SDK_ROOT=""
          
          # Executa o buildozer com log detalhado para vermos o erro real se falhar
          buildozer -v android debug
        env:
          # Sobrescreve variaveis do sistema que o GitHub injeta
          ANDROID_NDK_HOME: ""
          ANDROID_SDK_ROOT: ""
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
