name: Build APK Financas 2026

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configura Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configura Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Limpeza de NDKs pré-instalados
        run: sudo rm -rf /usr/local/lib/android/sdk/ndk

      - name: Cria arquivo de SWAP de 12GB
        run: |
          sudo swapoff -a
          sudo fallocate -l 12G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=12288
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Instala dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev gettext libtool autoconf automake pkg-config
          sudo apt-get install -y --fix-broken
          sudo apt-get install -y \
            python3-pip build-essential git python3-dev ffmpeg libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Instala Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Gerar APK com Buildozer
        run: |
          # Remove cache antigo para evitar FileNotFoundError
          rm -rf .buildozer
          buildozer -v android debug

      - name: Upload do APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
