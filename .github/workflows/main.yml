name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Rodar Buildozer no Windows
        shell: cmd
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          buildozer android debug
