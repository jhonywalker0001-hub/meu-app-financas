name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential openjdk-17-jdk-headless zip unzip libffi-dev libssl-dev autoconf libtool pkg-config libncurses5 libncursesw5
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Criar o APK
        run: |
          # Limpeza profunda de variáveis que causam conflito
          unset ANDROID_NDK_HOME
          unset ANDROID_HOME
          # Remove pastas de builds anteriores que possam estar corrompidas
          rm -rf .buildozer
          # Executa o build forçando o download das ferramentas corretas
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Subir o APK Final
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-financas-final
          path: bin/*.apk
