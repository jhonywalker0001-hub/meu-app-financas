name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java e Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Dependencias do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential openjdk-17-jdk-headless zip unzip libffi-dev libssl-dev autoconf libtool pkg-config libncurses5 libncursesw5
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Criar o APK
        run: |
          # Mata qualquer rastro de variáveis de ambiente do NDK do GitHub
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_HOME
          export ANDROID_SDK_ROOT=""
          export ANDROID_NDK_HOME=""
          
          # Executa o buildozer com log detalhado
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Subir o APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-financas-final
          path: bin/*.apk
