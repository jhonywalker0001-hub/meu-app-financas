name: Build APK Financas 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python e Java
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpeza Total de Variaveis e NDK
        run: |
          # Remove fisicamente as pastas que causam o conflito
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          
          sudo apt-get update
          sudo apt-get install -y build-essential zip unzip libffi-dev libssl-dev autoconf libtool pkg-config
          pip install Cython==0.29.33 buildozer

      - name: Gerar APK (Forçando Limpeza)
        run: |
          # Remove as variáveis de ambiente que o log mostrou estarem ativas
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK
          unset ANDROID_NDK_LATEST_HOME
          export ANDROID_NDK_HOME=""
          export ANDROID_SDK_ROOT=""
          
          # Roda o buildozer com log nivel 2 para capturar qualquer detalhe extra
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
