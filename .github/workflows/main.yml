name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build APK com Docker Oficial
        uses: digisensei/buildozer-action@v1
        with:
          command: android debug
          buildozer_version: stable

      - name: Salvar APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: aplicativo-financas
          path: bin/*.apk
