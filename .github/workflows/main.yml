name: Build APK Financas 2026 - Tentativa 93
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpeza Profunda do Ambiente
        run: |
          # Remove caches corrompidos de tentativas anteriores
          rm -rf .buildozer
          rm -rf bin
          # Remove o NDK do sistema que causa conflito
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev autoconf libtool pkg-config cmake

      - name: Instala Ferramentas
        run: |
          pip install --upgrade Cython==0.29.33
          pip install buildozer

      - name: Gerar APK
        run: |
          # Zera as variáveis para o Buildozer configurar o SDK do zero corretamente
          unset ANDROID_NDK_ROOT
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          export ANDROID_NDK_HOME=""
          
          # Swap para o Pandas não travar a RAM
          sudo fallocate -l 8G /swapfile || true
          sudo chmod 600 /swapfile || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Financas-2026-APK
          path: bin/*.apk
