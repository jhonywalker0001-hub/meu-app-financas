name: Build APK Financas 2026

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Configura Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configura Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Limpeza de Espaço
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Cria SWAP de 20GB
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo fallocate -l 20G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=20480
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Instala Ferramentas de Compilação
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext libunwind-dev libtool autoconf automake pkg-config build-essential

      - name: Instala Dependências de Gráficos (Matplotlib)
        run: |
          sudo apt-get install -y libfreetype6-dev libpng-dev libjpeg-dev

      - name: Instala Dependências Kivy
        run: |
          sudo apt-get install -y \
            python3-pip python3-dev ffmpeg libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Instala Buildozer e Dependências Python
        run: |
          pip install --upgrade pip
          pip install buildozer "cython<3.0"
          pip install numpy

      - name: Limpa Build Anterior (se existir)
        run: |
          rm -rf .buildozer/android/platform/build-arm64-v8a/build/
          rm -rf .buildozer/android/app/
          mkdir -p bin

      - name: Build APK com Buildozer
        timeout-minutes: 120
        run: |
          buildozer android debug 2>&1 | tee build.log || true
          echo "=== VERIFICANDO RESULTADO ==="
          ls -la bin/ 2>/dev/null || echo "Pasta bin vazia ou não existe"
          find .buildozer -name "*.apk" 2>/dev/null | head -5 || echo "Nenhum APK encontrado no buildozer"

      - name: Copia APK se gerado em outro lugar
        run: |
          find .buildozer -name "*.apk" -exec cp {} bin/ \; 2>/dev/null || true
          ls -la bin/

      - name: Upload do Log de Build (sempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5

      - name: Upload do APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Financas-App-2026
          path: bin/*.apk
          retention-days: 30
