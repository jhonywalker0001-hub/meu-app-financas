name: Build APK Financas 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python e Java
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpeza Extrema e Instalação
        run: |
          # Deleta o NDK r27 que o GitHub pré-instala e causa o erro
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          
          sudo apt-get update
          sudo apt-get install -y build-essential zip unzip libffi-dev libssl-dev autoconf libtool pkg-config
          pip install Cython==0.29.33 buildozer

      - name: Gerar APK
        run: |
          # Limpa variáveis de ambiente para o Buildozer baixar o NDK correto
          export ANDROID_NDK_HOME=""
          export ANDROID_SDK_ROOT=""
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: Financas2026-APK
          path: bin/*.apk
