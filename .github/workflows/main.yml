name: Build APK Financas
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-pip python3-setuptools python3-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev

      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          export PATH=$PATH:$HOME/.local/bin

      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Aceita as licenças do Android automaticamente
          yes | buildozer android debug

      - name: Upload APK Finanças
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-financas-S25
          path: bin/*.apk
