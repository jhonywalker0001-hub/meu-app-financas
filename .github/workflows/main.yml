name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Dependências do Sistema
        # Estas são as dependências reais exigidas pelo Buildozer para compilar Android
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Instalar Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          # Adiciona o diretório do buildozer ao PATH global do GitHub Actions
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build do APK
        run: |
          # O "yes" aceita automaticamente os termos de licença do Android SDK
          yes | buildozer android debug

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-financas-final
          path: bin/*.apk
