name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Dependencias e Limpeza
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zip unzip libffi-dev libssl-dev autoconf libtool pkg-config
          # Remove o NDK que causa o "exit code 1"
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          pip install Cython==0.29.33 buildozer

      - name: Build com Buildozer
        run: |
          # Força o Buildozer a ignorar os caminhos padrão do GitHub
          export ANDROID_SDK_ROOT=""
          export ANDROID_NDK_ROOT=""
          buildozer -v android debug
