name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build com Docker (Evita erros do sistema)
        uses: ArtemShatalkin/buildozer-action@v1.6.1
        with:
          buildozer_version: stable
          command: android debug
          repository_root: .

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-financas
          path: bin/*.apk
