name: CI - App Finanças

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "requirements.txt não encontrado, pulando..."

      - name: Rodar testes / verificação
        run: |
          echo "=== Verificando se o app importa corretamente ==="
          python -c "
          from kivymd.app import MDApp
          from dashboard import Dashboard
          from transacoes import TelaTransacoes
          from add_transacao import AddTransacao
          print('✅ Todas as importações principais funcionam!')
          " || echo "❌ Erro de importação detectado"

      - name: Upload log em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: |
            *.log
            build.log
