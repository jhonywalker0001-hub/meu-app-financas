name: Build APK Via Rapida
on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Instalar Python e Buildozer
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user buildozer Cython==0.29.33
          # Ignora erros de sistema e instala o Java necessário para o Android
          sudo apt-get install -y openjdk-17-jdk

      - name: Gerar APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # O yes aceita as licenças do Android automaticamente
          yes | buildozer android debug

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-financeiro
          path: bin/*.apk
