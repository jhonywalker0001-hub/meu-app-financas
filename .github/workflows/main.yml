name: Build APK Financas 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.buildozer_global
          key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            libjpeg-dev \
            libpng-dev \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade Cython
          pip install buildozer

      - name: Build APK
        run: |
          # LIMPA variáveis de ambiente conflitantes do sistema
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          
          # Força Buildozer a usar seus próprios downloads
          export BUILDOZER_WARN_ON_ROOT=0
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          
          # Build com timeout extendido (pandas é pesado)
          buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          # Desativa verificações de NDK do sistema
          ANDROID_NDK_ROOT: ""
          ANDROID_NDK_HOME: ""
          ANDROID_NDK: ""

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk
          if-no-files-found: error
