name: Build APK Financas 2026 - COM Pandas
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120  # Aumentado para builds pesados
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.buildozer_global
          key: ${{ runner.os }}-buildozer-pandas-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-pandas-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            libjpeg-dev \
            libpng-dev \
            zlib1g-dev \
            libltdl-dev \
            libsqlite3-dev \
            freetype-dev \
            libharfbuzz-dev \
            libfribidi-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade Cython
          pip install buildozer

      - name: Create recipes directory
        run: |
          mkdir -p recipes

      - name: Build APK (com pandas - com swap aumentado)
        run: |
          # LIMPA TODAS variáveis de ambiente conflitantes do sistema
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          
          # Configura ambiente limpo
          export BUILDOZER_WARN_ON_ROOT=0
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          
          # Aumenta swap para compensar RAM limitada (pandas consome muito)
          echo "Aumentando swap..."
          sudo fallocate -l 8G /swapfile || true
          sudo chmod 600 /swapfile || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          free -h
          
          # Build com timeout extendido
          echo "Iniciando build..."
          buildozer -v android debug 2>&1
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_NDK_ROOT: ""
          ANDROID_NDK_HOME: ""
          ANDROID_NDK: ""
          ANDROID_SDK_ROOT: ""
          ANDROID_HOME: ""

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-com-pandas
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload logs em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-falha
          path: .buildozer/android/platform/build-*/build.log
          if-no-files-found: ignore
