name: Build APK Financas 2026

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configura Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configura Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Limpeza Inicial de Espaço
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          # Não apague a pasta .buildozer com rm -rf para evitar FileNotFoundError
          # O buildozer cuidará da estrutura interna.

      - name: Cria arquivo de SWAP de 12GB
        run: |
          sudo swapoff -a
          sudo fallocate -l 12G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=12288
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Instala Ferramentas de Compilação (Fix Autopoint)
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext libunwind-dev libtool autoconf automake pkg-config build-essential
          # Garante que o autopoint seja reconhecido globalmente pelo PATH
          sudo apt-get install --reinstall gettext
          which autopoint || (sudo ln -s /usr/bin/autopoint /usr/local/bin/autopoint)

      - name: Instala Dependências Kivy e Gráficas
        run: |
          sudo apt-get install -y --fix-broken
          sudo apt-get install -y \
            python3-pip python3-dev ffmpeg libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Instala Buildozer e Cython Estável
        run: |
          pip install --upgrade pip
          pip install buildozer "cython<3.0"

      - name: Gerar APK com Buildozer
        run: |
          # Comando oficial para limpar builds anteriores sem quebrar a estrutura de pastas
          buildozer android clean
          buildozer -v android debug

      - name: Upload do APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: Financas-App-2026
          path: bin/*.apk
