name: Build APK Financas 2026 - Tentativa 97
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpeza e Preparação
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          rm -rf .buildozer
          rm -rf bin
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev autoconf libtool pkg-config cmake

      - name: Instala Buildozer e Cython
        run: |
          pip install --upgrade Cython==0.29.33
          pip install buildozer

      - name: Gerar APK
        run: |
          # Swap de 8GB com verificação de arquivo existente para evitar erro "busy"
          if [ ! -f /swapfile ]; then
            sudo fallocate -l 8G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          
          buildozer -v android debug
