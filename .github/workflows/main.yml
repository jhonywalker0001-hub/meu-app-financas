name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build APK com Docker
        uses: akshay-v-m/buildozer-action@v1
        with:
          buildozer_version: stable
          command: android debug
          repository_root: .

      - name: Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-S25
          path: bin/*.apk
