name: Build APK Resgate
on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Forçando uma versão de sistema mais compatível

    steps:
      - name: Passo 1 - Baixar Codigo
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Passo 3 - Instalar Buildozer e Dependencias Graficas
        run: |
          pip3 install --user --upgrade buildozer Cython==0.29.33
          # Instalando bibliotecas que o Matplotlib e Pandas exigem no Linux
          sudo apt-get install -y libsqlite3-dev sqlite3 bzip2 libbz2-dev libc6-dev libgdbm-dev libncursesw5-dev libreadline-gplv2-dev libssl-dev tk-dev wget curl lzma liblzma-dev

      - name: Passo 4 - Gerar APK (Modo Verbose)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # O 'debug' com o 'yes' agora vai detalhar o erro se parar
          yes | buildozer -v android debug
          
      - name: Passo 5 - Salvar Arquivo
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-financas-s25
          path: bin/*.apk
