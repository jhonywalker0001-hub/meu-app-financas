name: Build APK S25
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout código
        uses: actions/checkout@v4 # Versão estável

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado para Node 24
        with:
          python-version: "3.10"

      - name: Configurar Java
        uses: actions/setup-java@v4 # Atualizado para Node 24
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          export PATH=$PATH:$HOME/.local/bin

      - name: Compilar APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # O yes garante que o build não pare por licenças do Android
          yes | buildozer android debug

      - name: Salvar APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-estatisticas-S25
          path: bin/*.apk
