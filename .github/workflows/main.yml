name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Instalar Dependencias Minimas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential openjdk-17-jdk-headless zip unzip

      - name: Criar o APK (Modo Silencioso)
        run: |
          yes | buildozer android debug

      - name: Subir APK Final
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-S25-final
          path: bin/*.apk
