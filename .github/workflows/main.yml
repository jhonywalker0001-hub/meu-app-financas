name: Build APK - Minhas Finanças

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Cache Buildozer (acelera bastante as builds)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
            ~/.cache/pip
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build APK com Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer -v android debug
          buildozer_version: master
          # Removemos python_version (causava warning)
          # Adicionamos opções para corrigir problema de permissão (chown)
          docker_image: ghcr.io/artemsbulgakov/buildozer-action:latest

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App-Financas-APK
          path: bin/*.apk
