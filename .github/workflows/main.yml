name: Build APK Final 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Versão mais compatível com ferramentas Android

    steps:
      - name: Passo 1 - Checkout
        uses: actions/checkout@v4

      - name: Passo 2 - Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Passo 3 - Instalar Buildozer
        run: |
          # Atualiza apenas o pip e instala o essencial para evitar o erro 100
          pip3 install --user --upgrade pip
          pip3 install --user buildozer Cython==0.29.33

      - name: Passo 4 - Gerar APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Aceita automaticamente as licenças do Android SDK
          yes | buildozer android debug

      - name: Passo 5 - Upload do APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-financeiro-final
          path: bin/*.apk
