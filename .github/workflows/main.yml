name: CI - App Finanças

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pil \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libmtdev1

      - name: Instalar pacotes Python
        run: |
          python -m pip install --upgrade pip
          pip install kivy kivymd matplotlib pillow

      - name: Configurar Kivy para ambiente headless (sem tela)
        run: |
          mkdir -p ~/.kivy
          cat > ~/.kivy/config.ini << EOF
          [graphics]
          fullscreen = 0
          width = 800
          height = 600
          fbo = force
          [input]
          mouse = mouse
          mtdev = ""
          [postproc]
          doubletap_time = 0
          [kivy]
          log_level = warning
          EOF

      - name: Testar importações e inicialização básica
        run: |
          python -c '
          import os
          os.environ["KIVY_NO_ARGS"] = "1"
          os.environ["KIVY_NO_CONSOLE_LOG"] = "1"
          
          print("Testando importações...")
          from kivymd.app import MDApp
          from dashboard import Dashboard
          from transacoes import TelaTransacoes
          from add_transacao import AddTransacao
          
          print("✅ Todas as importações OK")
          
          # Teste leve de criação do Dashboard sem rodar o app
          print("Testando criação do Dashboard...")
          dashboard = Dashboard()
          print("✅ Dashboard criado com sucesso")
          
          print("🎉 Tudo passou nos testes!")
          '
