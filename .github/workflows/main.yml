name: Build APK
on:
  push:
    branches: [ main, principal ]
  pull_request:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # Trocamos para esta que é mais estável
        uses: Ente-AI/Buildozer-Action@v1.2.2
        with:
          buildozer_version: stable
          command: buildozer android debug
          repository_root: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
