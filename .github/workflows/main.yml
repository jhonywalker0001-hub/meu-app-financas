name: Build APK Financas 2026 - Tentativa 98
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpeza Profunda
        run: |
          # Remove resquicios de NDK e SDK do runner
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          rm -rf .buildozer
          
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev autoconf libtool pkg-config cmake

      - name: Instala Buildozer e Cython
        run: |
          pip install --upgrade Cython==0.29.33
          pip install buildozer

      - name: Gerar APK
        run: |
          # Criando Swap para o Pandas (Vital para nao dar Crash)
          sudo fallocate -l 10G /swapfile || true
          sudo chmod 600 /swapfile || true
          sudo mkswap /swapfile || true
          sudo swapon /swapfile || true
          
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          
          # Comando com log limpo
          buildozer -v android debug
