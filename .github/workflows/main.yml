name: Build APK Financas 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python e Java
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpeza e Instalacao
        run: |
          # Deleta qualquer NDK pre-instalado no servidor
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          
          sudo apt-get update
          sudo apt-get install -y build-essential zip unzip libffi-dev libssl-dev autoconf libtool pkg-config
          pip install Cython==0.29.33 buildozer

      - name: Gerar APK
        run: |
          # Mata as variaveis que causam o erro de 1 minuto
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK
          export ANDROID_NDK_HOME=""
          export ANDROID_SDK_ROOT=""
          
          # Executa o buildozer
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
