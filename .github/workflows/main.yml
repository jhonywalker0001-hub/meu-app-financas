name: Build APK Financas 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.buildozer_global
          key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            zip \
            unzip \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config \
            libltdl-dev \
            libffi-dev \
            libsqlite3-dev \
            libjpeg-dev \
            libpng-dev \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade Cython
          pip install buildozer

      - name: Build APK
        run: |
          # Configura variáveis necessárias
          export JAVA_HOME=${{ env.JAVA_HOME }}
          
          # Executa buildozer com timeout aumentado
          buildozer -v android debug 2>&1
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk
          if-no-files-found: error
