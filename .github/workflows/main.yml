name: Build APK Financas 2026 - Teste

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Verifica Arquivos Essenciais
        run: |
          echo "=== ESTRUTURA DO REPOSITÓRIO ==="
          ls -la
          echo ""
          echo "=== VERIFICANDO ARQUIVOS ==="
          test -f buildozer.spec && echo "✓ buildozer.spec encontrado" || (echo "✗ buildozer.spec NÃO ENCONTRADO" && exit 1)
          test -f main.py && echo "✓ main.py encontrado" || (echo "✗ main.py NÃO ENCONTRADO" && exit 1)
          echo ""
          echo "=== CONTEÚDO DO buildozer.spec ==="
          cat buildozer.spec

      - name: Configura Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configura Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cria SWAP de 8GB
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Instala Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-dev build-essential
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install buildozer "cython<3.0"

      - name: Build APK
        timeout-minutes: 60
        run: |
          buildozer android debug 2>&1 | tee build.log || true
          echo "=== RESULTADO ==="
          ls -la bin/ 2>/dev/null || echo "bin/ não existe"
          cat build.log | tail -100

      - name: Upload Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5
