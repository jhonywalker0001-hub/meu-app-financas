name: Build APK Financas 2026 - Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpeza e Dependências do Sistema
        run: |
          # Remove o NDK 27 que causa o conflito de 1 minuto
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev autoconf libtool pkg-config cmake

      - name: Instala Buildozer e Cython
        run: |
          pip install --upgrade Cython==0.29.33
          pip install buildozer

      - name: Build APK (Com Memória Extra para Pandas)
        run: |
          # Isola o ambiente de variáveis conflitantes
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK
          export ANDROID_SDK_ROOT=""
          
          # Aumenta a RAM virtual (Swap) para 8GB para compilar o Pandas
          sudo fallocate -l 8G /swapfile || true
          sudo chmod 600 /swapfile || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          
          # Inicia o build com log nível 2
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload do APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: Financas-2026-APK
          path: bin/*.apk
