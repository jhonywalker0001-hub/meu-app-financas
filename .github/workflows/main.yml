name: Build APK Financas 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Limpeza de Ambiente e Instalação
        run: |
          # Remove NDKs pré-instalados que causam o erro nos logs
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo apt-get update
          sudo apt-get install -y build-essential openjdk-17-jdk-headless zip unzip libffi-dev libssl-dev autoconf libtool pkg-config
          pip install Cython==0.29.33 buildozer

      - name: Criar APK
        run: |
          # Garante que o Buildozer ignore qualquer caminho antigo
          export ANDROID_NDK_HOME=""
          export ANDROID_HOME=""
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-financas-final
          path: bin/*.apk
