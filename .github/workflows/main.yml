name: Build APK 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Buildozer
        run: |
          pip3 install --user buildozer Cython==0.29.33

      - name: Gerar APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # O 'yes' aceita as licenças do Android automaticamente
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-financeiro-S25
          path: bin/*.apk
