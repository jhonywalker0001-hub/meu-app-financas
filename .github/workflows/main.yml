name: Build APK Financas 2026 - Tentativa 96
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configuração do Sistema e Java
        run: |
          # Remove NDKs que causam conflito de versão
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          
          # Garante que o Java 17 seja a escolha padrão do sistema
          sudo update-alternatives --set java /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64/bin/java || true
          
          # Limpeza de builds anteriores
          rm -rf .buildozer
          rm -rf bin
          
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev autoconf libtool pkg-config cmake

      - name: Instala Buildozer e Cython
        run: |
          pip install --upgrade Cython==0.29.33
          pip install buildozer

      - name: Gerar APK
        run: |
          # Define o JAVA_HOME para o caminho real do GitHub Actions
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          
          # Swap de 8GB para compilar o Pandas sem estourar a RAM
          sudo fallocate -l 8G /swapfile || true
          sudo chmod 600 /swapfile || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          
          buildozer -v android debug
