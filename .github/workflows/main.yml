name: Build APK Financas 2026 - Tentativa 95
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Purga de Conflitos e Correção de JAVA_HOME
        run: |
          # Remove NDKs problemáticos do sistema
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          
          # Limpa pastas locais
          rm -rf .buildozer
          rm -rf bin
          
          # CORREÇÃO CRÍTICA DO JAVA: Cria um link simbólico para o caminho que o Buildozer exige
          # Isso resolve o erro "invalid directory: /usr/lib/jvm/java-17-openjdk-amd64"
          sudo mkdir -p /usr/lib/jvm
          sudo ln -s $JAVA_HOME /usr/lib/jvm/java-17-openjdk-amd64
          
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev autoconf libtool pkg-config cmake

      - name: Instala Buildozer e Cython
        run: |
          pip install --upgrade Cython==0.29.33
          pip install buildozer

      - name: Gerar APK
        run: |
          # Isola o ambiente e define o JAVA_HOME explicitamente para o processo
          export JAVA_HOME=$(readlink -f $(which java) | sed "s:/bin/java::")
          unset ANDROID_NDK_ROOT
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          export ANDROID_NDK_HOME=""
          
          # Swap de 8GB para o Pandas
          sudo fallocate -l 8G /swapfile || true
          sudo chmod 600 /swapfile || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          
          buildozer -v android debug
        env:
          # Força o caminho que o log anterior reclamou que estava faltando
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Financas-2026-APK
          path: bin/*.apk
