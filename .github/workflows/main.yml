name: Build APK Sobrevivencia
on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Baixar Codigo
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Passo 3 - Instalar Buildozer
        run: |
          pip3 install --user buildozer
          pip3 install --user Cython==0.29.33

      - name: Passo 4 - Gerar APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # O 'yes' responde 'sim' para todas as perguntas do Google
          yes | buildozer android debug

      - name: Passo 5 - Salvar Arquivo
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-final
          path: bin/*.apk
